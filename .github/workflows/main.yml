name: static web hosting
on:
  push:
    branches: [ "master" ]
permissions: 
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: cline github repo
        uses: actions/checkout@v4

      - name: setup github pages
        uses: actions/configure-pages@v6.0.0

      - name: upload files to pages
        uses:  actions/upload-pages-artifact@v5.0.0
        with:
          path: .
          
      - name: deploy the wensite
        uses: actions/deploy-pages@v3.0.2-node.24
